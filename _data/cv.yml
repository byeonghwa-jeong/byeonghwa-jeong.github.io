        summary: "Research on high-resolution population modeling, GeoAI, disaster impact assessment, socioeconomic mapping, and global geospatial data products."
        highlights:
          - "Participating in LandScan Global and LandScan Mosaic projects that generate 1 km and 100 m global gridded population data."
