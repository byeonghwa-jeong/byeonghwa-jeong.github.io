Experience:
  - company: Oak Ridge National Laboratory
    position: R&D Associate
    location: Knoxville, USA
    start_date: 2025-02
    end_date: present
    summary: >
      Conducts research on high-resolution population modeling, GeoAI, disaster impact assessment,
      socioeconomic mapping, and global geospatial data products.
    highlights:
      - "Participating in LandScan Global and LandScan Mosaic projects that generate 1 km and 100 m global gridded population data."
      - "Integrating satellite-based damage assessments with population models to generate near-real-time estimates of populations affected by disasters and conflicts."
      - "Developing a global habitable probability mask using AI to improve the accuracy of gridded population data."
      - "Building AI models to predict building-level wealth indices from multimodal data, including satellite images, building features, and building footprint data."
      - "Applying multiple instance learning to survey-based data to produce more reliable small-area estimates of household wealth distribution."

  - company: University of Toronto
    position: Post-Doctoral Research Fellow
    location: Toronto, Canada
    start_date: 2023-07
    end_date: 2025-01
    summary: >
      Worked on downtown recovery, footfall analytics, urban spatial data, and machine learning-based analysis
      of post-pandemic urban change.
    highlights:
      - "Participated in a downtown recovery project measuring the degree of recovery of downtown areas from the COVID-19 pandemic."
      - "Estimated uncertainty in sample footfall data."
      - "Analyzed recovery rates of individual buildings in downtown areas and investigated relationships between building characteristics and recovery rates."
      - "Imputed missing footfall data using deep learning-based imputation models."
      - "Developed new downtown boundaries using unsupervised image segmentation models and open-source spatial big data."
      - "Explored the influence of socioeconomic variables on downtown recovery rates through explainable AI."

