summary: >
R&D Associate in the Geospatial Science and Human Security Division at Oak Ridge National Laboratory.
My research focuses on geospatial data science, GeoAI, machine learning, remote sensing, population modeling,
socioeconomic mapping, and the analysis and prediction of social and geographical phenomena using large-scale
spatiotemporal data.

